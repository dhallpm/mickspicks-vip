<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Micks Picks | Google Sheets Import Helper</title>
  <style>
    :root{--bg:#090909;--panel:#151515;--line:#2c2c2c;--text:#f7efe0;--muted:#a99f8d;--gold:#e2b84d;--red:#ff6868;--green:#48d597}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}main{width:min(980px,calc(100% - 32px));margin:0 auto;padding:32px 0 48px}h1{margin:0 0 18px;font-size:clamp(28px,5vw,48px)}label{display:block;margin-bottom:8px;color:var(--muted);font-size:12px;font-weight:800;text-transform:uppercase}select,textarea,input[type=file]{width:100%;border:1px solid var(--line);border-radius:8px;background:#0f0f0f;color:var(--text);padding:12px;font:inherit}textarea{min-height:260px;resize:vertical;font-family:ui-monospace,SFMono-Regular,Consolas,monospace}button{border:1px solid transparent;border-radius:8px;padding:11px 14px;background:var(--gold);color:#080808;font-weight:900;cursor:pointer}button.secondary{background:transparent;color:var(--text);border-color:var(--line)}button:disabled{opacity:.55;cursor:progress}pre{min-height:190px;margin:0;padding:16px;border:1px solid var(--line);border-radius:8px;background:#050505;color:var(--text);white-space:pre-wrap;overflow:auto}.banner{display:none;margin-bottom:18px;padding:13px 16px;border:1px solid #6f5414;border-radius:8px;background:#241a06;color:#ffe097;font-weight:1000}.banner.on{display:block}.panel{border:1px solid var(--line);border-radius:8px;background:var(--panel);padding:18px;margin-top:16px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}.toggle{display:flex;align-items:center;gap:10px;color:var(--text);font-weight:800}.toggle input{width:18px;height:18px}.status{margin-top:10px;color:var(--muted);font-size:13px}.status.ok{color:var(--green)}.status.bad{color:var(--red)}@media(max-width:720px){.grid{grid-template-columns:1fr}main{width:min(100% - 20px,980px);padding-top:20px}}
  </style>
</head>
<body>
  <main>
    <h1>Google Sheets Import Helper</h1>
    <div class="banner" id="dryRunBanner">DRY RUN - NO GOOGLE SHEET WRITE</div>
    <section class="panel"><div class="grid"><div><label for="table">Table</label><select id="table"><option value="picks">Master Picks</option><option value="propsLab">Props Lab</option><option value="lottoParlays">Lotto Parlays</option><option value="longshots">Longshots</option></select></div><div><label for="file">JSON File</label><input id="file" type="file" accept="application/json,.json,.txt"></div></div><div class="actions"><label class="toggle"><input id="dryRun" type="checkbox"> Dry run</label><button id="importButton" type="button">Import JSON</button><button id="cleanButton" type="button" class="secondary">Clean JSON</button></div><p class="status" id="status">Idle</p></section>
    <section class="panel"><label for="jsonText">Payload</label><textarea id="jsonText" spellcheck="false" placeholder='{"records":[]}'></textarea></section>
    <section class="panel"><label for="output">Result</label><pre id="output">{}</pre></section>
  </main>
  <script>
    const endpoint='./api/import-google-sheets';const table=document.getElementById('table');const file=document.getElementById('file');const dryRun=document.getElementById('dryRun');const banner=document.getElementById('dryRunBanner');const jsonText=document.getElementById('jsonText');const output=document.getElementById('output');const statusEl=document.getElementById('status');const importButton=document.getElementById('importButton');const cleanButton=document.getElementById('cleanButton');
    function setBusy(v){importButton.disabled=v;cleanButton.disabled=v}function setStatus(t,k=''){statusEl.textContent=t;statusEl.className=`status ${k}`.trim()}function syncBanner(){banner.classList.toggle('on',dryRun.checked)}
    function cleanText(raw){let text=String(raw||'').trim();text=text.replace(/^```(?:json)?/i,'').replace(/```$/i,'').trim();const a=text.indexOf('{'),b=text.indexOf('[');let s=-1;if(a>=0&&b>=0)s=Math.min(a,b);else s=Math.max(a,b);if(s>0)text=text.slice(s).trim();const c=text.lastIndexOf('}'),d=text.lastIndexOf(']'),e=Math.max(c,d);if(e>=0&&e<text.length-1)text=text.slice(0,e+1).trim();return text.replace(/^\uFEFF/,'').trim()}
    function show(data){output.textContent=JSON.stringify(data,null,2);setStatus(data.ok?(data.dryRun?'Dry run complete':`Created ${data.created} row(s)`):(data.error||'Import failed'),data.ok?'ok':'bad')}
    async function payloadFromInput(){if(file.files[0]){jsonText.value=await file.files[0].text()}const raw=cleanText(jsonText.value);jsonText.value=raw;if(!raw)throw new Error('No JSON payload selected.');const parsed=JSON.parse(raw);if(Array.isArray(parsed))throw new Error('Top-level array not accepted. Use {"records":[...]}');if(!parsed.table&&!parsed.batches)parsed.table=table.value;parsed.dryRun=dryRun.checked;return parsed}
    async function postPayload(payload){banner.classList.toggle('on',payload.dryRun===true);setBusy(true);setStatus('Running...');try{const res=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const data=await res.json().catch(()=>({ok:false,error:`HTTP ${res.status}`}));show(data)}catch(err){show({ok:false,created:0,error:err.message||String(err)})}finally{setBusy(false)}}
    importButton.addEventListener('click',async()=>{try{await postPayload(await payloadFromInput())}catch(err){show({ok:false,created:0,error:err.message||String(err)})}});cleanButton.addEventListener('click',()=>{jsonText.value=cleanText(jsonText.value);setStatus('Cleaned JSON.','ok')});dryRun.addEventListener('change',syncBanner);syncBanner();
  </script>
</body>
</html>
